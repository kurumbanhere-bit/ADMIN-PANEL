<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Identity - KL ESPORTS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root { --p-orange: #ff4d00; --bg: #000; --card-bg: #111; --border: #222; --text-gray: #888; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; }
        
        .header { display: flex; align-items: center; margin-bottom: 30px; }
        .back-btn { color: white; text-decoration: none; font-size: 20px; margin-right: 15px; }

        .profile-container { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; padding: 25px; text-align: center; box-shadow: 0 10px 30px rgba(255, 77, 0, 0.1); }
        .avatar { font-size: 50px; color: var(--p-orange); background: #1a1a1a; width: 100px; height: 100px; line-height: 100px; border-radius: 50%; margin: 0 auto 20px; border: 2px solid var(--p-orange); }

        .info-group { text-align: left; margin-top: 25px; }
        .info-item { background: #0a0a0a; padding: 15px; border-radius: 12px; margin-bottom: 12px; border-left: 4px solid var(--p-orange); }
        .info-item label { display: block; font-size: 10px; color: var(--text-gray); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .info-item span { font-size: 16px; font-weight: 600; color: #fff; }
        
        .balance-card { background: linear-gradient(135deg, #ff4d00, #ff8800); color: black; padding: 20px; border-radius: 15px; margin-top: 20px; text-align: center; }
        .balance-card label { font-size: 12px; font-weight: bold; opacity: 0.8; }
        .balance-card h2 { margin: 5px 0 0; font-size: 28px; }
    </style>
</head>
<body>

<div class="header">
    <a href="user-check.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
    <h1 style="font-size: 18px; margin: 0;">PLAYER IDENTITY</h1>
</div>

<div class="profile-container">
    <div class="avatar"><i class="fas fa-user-ninja"></i></div>
    <h2 id="display_name" style="margin: 0; color: var(--p-orange);">Loading...</h2>
    <p id="display_status" style="font-size: 12px; color: #0fa958; margin: 5px 0;">Verified Player ✅</p>

    <div class="info-group">
        <div class="info-item">
            <label>Username</label>
            <span id="u_name">---</span>
        </div>
        <div class="info-item">
            <label>In-Game Name (IGN)</label>
            <span id="g_name">---</span>
        </div>
        <div class="info-item">
            <label>Game ID</label>
            <span id="g_id">---</span>
        </div>
    </div>

    <div class="balance-card">
        <label>CURRENT BALANCE</label>
        <h2 id="u_wallet">₹0</h2>
    </div>
</div>

<script>
    // Firebase Config (Use same as your Admin Panel)
    const firebaseConfig = {
        apiKey: "AIzaSyBrHcONT6y0he3fzrtRGqdQMZfIMpGxcNo",
        authDomain: "kl-esports.firebaseapp.com",
        databaseURL: "https://kl-esports-default-rtdb.firebaseio.com",
        projectId: "kl-esports",
        storageBucket: "kl-esports.appspot.com",
        messagingSenderId: "440301376580",
        appId: "1:440301376580:web:fb0b8ae0df3fe096bd1811"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // URL-il ninnu UID edukkanulla logic
    const urlParams = new URLSearchParams(window.location.search);
    const uid = urlParams.get('uid');

    if (uid) {
        db.ref('users/' + uid).on('value', (snap) => {
            const user = snap.val();
            if (user) {
                document.getElementById('display_name').innerText = user.username || 'N/A';
                document.getElementById('u_name').innerText = user.username || 'N/A';
                document.getElementById('g_name').innerText = user.playerName || user.gameName || 'N/A';
                document.getElementById('g_id').innerText = user.gameID || 'N/A';
                document.getElementById('u_wallet').innerText = "₹" + (user.wallet || 0);
            } else {
                alert("User not found!");
            }
        });
    } else {
        alert("No User ID found in URL!");
    }
</script>

</body>
</html>
