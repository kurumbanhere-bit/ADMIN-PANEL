<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalize Results - Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root { --p-orange: #ff4d00; --bg: #000; --card: #111; --green: #00ff88; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 10px; }
        .sheet { background: var(--card); border-radius: 15px; border: 1px solid #222; padding: 10px; margin-top: 10px; }
        
        /* 6 Image Gallery Style */
        .host-result-preview { border-radius: 12px; border: 1px dashed #444; margin-bottom: 15px; padding: 10px; text-align: center; }
        .img-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
        .img-grid img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; border: 1px solid #333; cursor: pointer; transition: 0.3s; }
        .img-grid img:hover { transform: scale(1.05); border-color: var(--p-orange); }

        .header-row { display: grid; grid-template-columns: 1fr 60px 60px 80px; padding: 10px; font-size: 11px; color: #888; font-weight: bold; text-transform: uppercase; }
        .player-row { display: grid; grid-template-columns: 1fr 60px 60px 80px; align-items: center; gap: 8px; background: #1a1a1a; padding: 10px; border-radius: 10px; margin-bottom: 8px; border: 1px solid #333; }
        .p-name { font-weight: bold; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #eee; }
        
        input[type="number"], input[type="text"] { width: 100%; padding: 8px; background: #000; border: 1px solid #444; color: #fff; border-radius: 5px; text-align: center; font-size: 12px; box-sizing: border-box; }
        input:focus { border-color: var(--p-orange); outline: none; }
        
        .btn-finalize { width: 100%; padding: 16px; background: var(--p-orange); border: none; border-radius: 12px; color: #fff; font-weight: 800; cursor: pointer; margin-top: 20px; text-transform: uppercase; letter-spacing: 1px; }
        .btn-finalize:disabled { background: #555; cursor: not-allowed; }
        .loading { text-align: center; padding: 20px; color: var(--p-orange); font-weight: bold; }
    </style>
</head>
<body>

    <div style="padding: 10px; display: flex; align-items: center; justify-content: space-between;">
        <div style="display: flex; align-items: center; gap: 10px;">
            <i class="fa-solid fa-arrow-left" onclick="history.back()" style="cursor:pointer;"></i>
            <span style="font-weight: bold;">FINALIZE RESULTS</span>
        </div>
        <span id="matchStatus" style="font-size: 10px; color: var(--green); background: #113322; padding: 3px 8px; border-radius: 4px;">Ended</span>
    </div>

    <div class="host-result-preview">
        <span style="font-size: 12px; color: #888;">Host Uploaded Screenshots (Review)</span>
        <div class="img-grid" id="imageGallery">
            </div>
        <p id="noImgText" style="font-size: 11px; color: #555; display:none; margin-top:10px;">No screenshots found</p>
    </div>

    <div class="sheet">
        <div class="header-row">
            <div>Player</div>
            <div>Rank</div>
            <div>Kills</div>
            <div>Prize</div>
        </div>
        <div id="playerList" class="loading">Loading Winners Data...</div>
    </div>

    <button class="btn-finalize" id="finalBtn" onclick="finalizeMatch()">FINALIZE & ADD WINNERS ✅</button>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBrHcONT6y0he3fzrtRGqdQMZfIMpGxcNo",
            authDomain: "kl-esports.firebaseapp.com",
            databaseURL: "https://kl-esports-default-rtdb.firebaseio.com",
            projectId: "kl-esports",
            storageBucket: "kl-esports.appspot.com",
            messagingSenderId: "440301376580",
            appId: "1:440301376580:web:fb0b8ae0df3fe096bd1811"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const params = new URLSearchParams(window.location.search);
        const mid = params.get('id');

        let participantData = [];

        function loadData() {
            if(!mid) return alert("Match ID missing!");

            // 1. Load Match Details & 6 Images
            db.ref('matches/' + mid).on('value', snap => {
                const m = snap.val();
                if(!m) return;

                const gallery = document.getElementById('imageGallery');
                gallery.innerHTML = "";
                const imgs = m.resultImages || {};
                let hasImg = false;

                for(let i=0; i<6; i++) {
                    if(imgs[i]) {
                        hasImg = true;
                        gallery.innerHTML += `<img src="${imgs[i]}" onclick="window.open(this.src)">`;
                    }
                }
                if(!hasImg) document.getElementById('noImgText').style.display = 'block';

                // 2. Load Participants and Match Winners with pre-filled Host data
                db.ref('matches/' + mid + '/participants').once('value', pSnap => {
                    const pl = document.getElementById('playerList');
                    pl.innerHTML = "";
                    participantData = [];

                    pSnap.forEach(child => {
                        const p = child.val();
                        const pKey = child.key;
                        participantData.push({ key: pKey, data: p });

                        // Check if host already added winner data for this player
                        let hRank = "", hKills = 0, hPrize = 0;
                        if(m.winners) {
                            // Find matching player in host's winner list
                            Object.values(m.winners).forEach(w => {
                                if(w.playerName === (p.playerName || p.gameName)) {
                                    hRank = w.rank || "";
                                    hKills = w.kills || 0;
                                    hPrize = w.winnings || 0;
                                }
                            });
                        }

                        pl.innerHTML += `
                            <div class="player-row">
                                <div class="p-name">${p.playerName || p.gameName || "Unknown"}</div>
                                <input type="text" id="rank-${pKey}" placeholder="Rank" value="${hRank}">
                                <input type="number" id="kills-${pKey}" placeholder="0" value="${hKills}">
                                <input type="number" id="prize-${pKey}" placeholder="0" value="${hPrize}">
                            </div>
                        `;
                    });
                });
            });
        }

        async function finalizeMatch() {
            if(!confirm("Are you sure? This will add prize to wallets and move match to Winners Added Tab!")) return;
            
            const btn = document.getElementById('finalBtn');
            btn.disabled = true;
            btn.innerText = "PROCESSING WALLETS...";

            const finalWinners = {};
            const walletPromises = [];

            for(let pObj of participantData) {
                const pKey = pObj.key;
                const pData = pObj.data;
                const rank = document.getElementById(`rank-${pKey}`).value || "99+";
                const kills = parseInt(document.getElementById(`kills-${pKey}`).value) || 0;
                const prize = parseInt(document.getElementById(`prize-${pKey}`).value) || 0;

                finalWinners[pKey] = {
                    uid: pKey,
                    playerName: pData.playerName || pData.gameName || "Unknown",
                    rank: rank,
                    kills: kills,
                    winnings: prize
                };

                // Wallet Update Logic for REAL USERS
                if(prize > 0 && pData.type !== "Demo_Bot") {
                    const realUid = pData.uid || pKey;
                    const walletRef = db.ref('users/' + realUid + '/wallet');
                    
                    const pms = walletRef.transaction(currentVal => {
                        let deposit = 0, winnings = 0;
                        if (currentVal) {
                            if (typeof currentVal === 'object') {
                                deposit = parseInt(currentVal.deposit || 0);
                                winnings = parseInt(currentVal.winnings || 0);
                            } else {
                                deposit = parseInt(currentVal || 0);
                            }
                        }
                        return { deposit: deposit, winnings: winnings + prize };
                    });
                    walletPromises.push(pms);
                }
            }

            try {
                await Promise.all(walletPromises);

                // MATCH STATUS 'Completed' aakkunnu
                // Ithoode match 'Winners Added' section-ilekku maaram.
                await db.ref('matches/' + mid).update({
                    status: 'Completed',
                    winners: finalWinners
                });

                alert("Match Finalized! Moved to Winners Added Tab. 🔥");
                window.location.href = "admin_dashboard.html";
            } catch (error) {
                alert("Error: " + error.message);
                btn.disabled = false;
                btn.innerText = "FINALIZE & ADD WINNERS ✅";
            }
        }

        loadData();
    </script>
</body>
</html>
