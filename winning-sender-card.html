<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalize Results - KL ESPORTS Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root { --p-orange: #ff4d00; --bg: #000; --card: #111; --green: #00ff88; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 10px; }
        .sheet { background: var(--card); border-radius: 15px; border: 1px solid #222; padding: 10px; margin-top: 10px; }
        
        /* Result Preview Section */
        .host-result-preview { border-radius: 12px; border: 1px dashed #444; margin-bottom: 15px; padding: 10px; text-align: center; }
        #hostScreenshot { width: 100%; border-radius: 10px; display: none; margin-top: 10px; }

        .header-row { display: grid; grid-template-columns: 1fr 60px 60px 80px; padding: 10px; font-size: 11px; color: #888; font-weight: bold; text-transform: uppercase; }
        .player-row { display: grid; grid-template-columns: 1fr 60px 60px 80px; align-items: center; gap: 8px; background: #1a1a1a; padding: 10px; border-radius: 10px; margin-bottom: 8px; border: 1px solid #333; }
        .p-name { font-weight: bold; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        input[type="number"], input[type="text"] { width: 100%; padding: 8px; background: #000; border: 1px solid #444; color: #fff; border-radius: 5px; text-align: center; font-size: 12px; }
        
        .btn-finalize { width: 100%; padding: 16px; background: var(--p-orange); border: none; border-radius: 12px; color: #fff; font-weight: 800; cursor: pointer; margin-top: 20px; text-transform: uppercase; letter-spacing: 1px; }
        .loading { text-align: center; padding: 20px; color: var(--p-orange); }
        .host-badge { font-size: 9px; background: #333; padding: 2px 6px; border-radius: 4px; color: var(--green); margin-left: 5px; }
    </style>
</head>
<body>

    <div style="padding: 10px; display: flex; align-items: center; justify-content: space-between;">
        <div style="display: flex; align-items: center; gap: 10px;">
            <i class="fa-solid fa-arrow-left" onclick="history.back()"></i>
            <span style="font-weight: bold;">FINALIZE WINNERS</span>
        </div>
        <span id="matchStatus" style="font-size: 10px; color: #888;"></span>
    </div>

    <div class="host-result-preview" id="screenshotBox">
        <span style="font-size: 12px; color: #888;">Host Result Screenshot</span>
        <img id="hostScreenshot" src="" alt="Result">
        <p id="noImgText" style="font-size: 11px; color: #555;">No screenshot uploaded yet</p>
    </div>

    <div class="sheet">
        <div class="header-row">
            <div>Player</div>
            <div>Rank</div>
            <div>Kills</div>
            <div>Prize</div>
        </div>
        <div id="playerList" class="loading">Loading Data...</div>
    </div>

    <button class="btn-finalize" onclick="finalizeMatch()">FINALIZE & ADD WALLET 🔥</button>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBrHcONT6y0he3fzrtRGqdQMZfIMpGxcNo",
            authDomain: "kl-esports.firebaseapp.com",
            databaseURL: "https://kl-esports-default-rtdb.firebaseio.com",
            projectId: "kl-esports",
            storageBucket: "kl-esports.appspot.com",
            messagingSenderId: "440301376580",
            appId: "1:440301376580:web:fb0b8ae0df3fe096bd1811"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const params = new URLSearchParams(window.location.search);
        const mid = params.get('id');

        let participants = [];
        let hostWinners = {};

        function loadData() {
            if(!mid) return;

            // 1. Fetch Match Data (Screenshot and Status)
            db.ref('matches/' + mid).on('value', snap => {
                const m = snap.val();
                if(m.resultImage) {
                    document.getElementById('hostScreenshot').src = m.resultImage;
                    document.getElementById('hostScreenshot').style.display = 'block';
                    document.getElementById('noImgText').style.display = 'none';
                }
                document.getElementById('matchStatus').innerText = "Status: " + (m.status || 'Unknown');
                
                // Store host's winners entries for auto-fill
                if(m.winners) hostWinners = m.winners;
            });

            // 2. Load Participants and Sync with Host's data
            db.ref('matches/' + mid + '/participants').once('value', snap => {
                const pl = document.getElementById('playerList');
                pl.innerHTML = "";
                participants = [];

                snap.forEach(child => {
                    const p = child.val();
                    participants.push(p);

                    // Check if host already set data for this player (By Name match)
                    let hRank = "", hKills = "", hPrize = "";
                    if(hostWinners) {
                        Object.values(hostWinners).forEach(hw => {
                            if(hw.playerName === p.gameName || hw.playerName === p.gamename) {
                                hRank = hw.rank || "";
                                hKills = hw.kills || "";
                                hPrize = hw.winnings || hw.prize || "";
                            }
                        });
                    }

                    pl.innerHTML += `
                        <div class="player-row">
                            <div class="p-name">${p.gameName || p.gamename}</div>
                            <input type="text" id="rank-${p.uid}" placeholder="Rank" value="${hRank}">
                            <input type="number" id="kills-${p.uid}" placeholder="0" value="${hKills}">
                            <input type="number" id="prize-${p.uid}" placeholder="0" value="${hPrize}">
                        </div>
                    `;
                });
            });
        }

        async function finalizeMatch() {
            if(!confirm("Proceed to update all wallets and complete match?")) return;

            const finalWinners = {};
            const plList = document.getElementById('playerList');
            
            for(let p of participants) {
                const rank = document.getElementById(`rank-${p.uid}`).value;
                const kills = parseInt(document.getElementById(`kills-${p.uid}`).value) || 0;
                const prize = parseInt(document.getElementById(`prize-${p.uid}`).value) || 0;

                // Create results object
                finalWinners[p.uid] = {
                    uid: p.uid,
                    playerName: p.gameName || p.gamename,
                    rank: rank || "99+",
                    kills: kills,
                    prize: prize
                };

                // Wallet Update Logic
                if(prize > 0) {
                    await db.ref('users/' + p.uid + '/wallet').transaction(curr => {
                        if(!curr) return { deposit: 0, winnings: prize };
                        return {
                            deposit: parseInt(curr.deposit || 0),
                            winnings: parseInt(curr.winnings || 0) + prize
                        };
                    });
                }
            }

            // Update match status to Completed
            db.ref('matches/' + mid).update({
                status: 'Completed',
                winners: finalWinners
            }).then(() => {
                alert("Match Finalized! Wallets Updated. 🔥");
                history.back();
            }).catch(err => alert("Error: " + err.message));
        }

        loadData();
    </script>
</body>
</html>
