<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - User Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root { --p-orange: #ff4d00; --bg: #000; --card-bg: #111; --border: #222; --red: #ff3333; --green: #0fa958; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; padding-top: 130px; }
        
        /* Fixed Search Header */
        .search-container { position: fixed; top: 0; left: 0; width: 100%; background: var(--bg); padding: 15px; box-sizing: border-box; z-index: 1000; border-bottom: 1px solid var(--border); }
        .header { border-bottom: 2px solid var(--p-orange); padding-bottom: 5px; margin-bottom: 10px; }
        .search-box { display: flex; gap: 8px; }
        .search-input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: #0a0a0a; color: white; outline: none; }
        .search-select { padding: 12px; border-radius: 10px; background: var(--card-bg); color: var(--p-orange); border: 1px solid var(--border); font-weight: bold; }
        
        /* User List Card */
        .user-card { 
            background: var(--card-bg); 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            padding: 15px; 
            margin-bottom: 10px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            cursor: pointer; 
            transition: 0.3s;
        }
        .user-card:hover { border-color: var(--p-orange); }
        .gn-badge { font-size: 11px; color: var(--p-orange); background: #ff4d0022; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        .ban-badge { font-size: 10px; background: var(--red); color: white; padding: 2px 6px; border-radius: 4px; margin-left: 5px; font-weight: bold; }

        /* Modal / Popup */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: #0a0a0a; border: 1px solid var(--p-orange); border-radius: 20px; padding: 25px; width: 85%; max-width: 350px; text-align: center; }
        .pop-title { color: var(--p-orange); font-weight: bold; font-size: 18px; margin-bottom: 5px; text-transform: uppercase; }
        .pop-email { color: #888; font-size: 12px; margin-bottom: 20px; display: block; word-break: break-all; }

        /* Popup Options */
        .pop-item { background: #111; border: 1px solid #222; padding: 15px; border-radius: 12px; margin-bottom: 12px; display: flex; align-items: center; cursor: pointer; text-decoration: none; color: white; font-size: 14px; }
        .pop-item i { margin-right: 15px; color: var(--p-orange); width: 20px; }
        
        .ban-btn { background: #ff333322; border: 1px solid var(--red); color: var(--red); }
        .ban-btn i { color: var(--red); }
        .unban-btn { background: #0fa95822; border: 1px solid var(--green); color: var(--green); }
        .unban-btn i { color: var(--green); }

        .close-btn { margin-top: 15px; color: #555; cursor: pointer; border: none; background: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="search-container">
    <div class="header"><h1 style="font-size: 18px; margin: 0;">PLAYERS LIST</h1></div>
    <div class="search-box">
        <select id="searchType" class="search-select">
            <option value="username">Name</option>
            <option value="gameName">Game Name</option>
            <option value="gameID">Player ID</option>
        </select>
        <input type="text" id="searchInput" class="search-input" placeholder="Search..." onkeyup="filterUsers()">
    </div>
</div>

<div id="userList"></div>

<div id="userModal" class="modal">
    <div class="modal-content">
        <div class="pop-title" id="popUserName">USER MENU</div>
        <span class="pop-email" id="popUserEmail">email@gmail.com</span>
        
        <a id="idLink" class="pop-item"><i class="fas fa-id-card"></i><span>Identity Settings</span></a>
        <a id="matchLink" class="pop-item"><i class="fas fa-gamepad"></i><span>Match History</span></a>
        <a id="transLink" class="pop-item"><i class="fas fa-wallet"></i><span>Transactions</span></a>

        <div id="banActionBtn" class="pop-item">
            <i class="fas fa-user-slash"></i><span>Ban Player</span>
        </div>

        <button class="close-btn" onclick="closePopup()">CLOSE</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBrHcONT6y0he3fzrtRGqdQMZfIMpGxcNo",
        authDomain: "kl-esports.firebaseapp.com",
        databaseURL: "https://kl-esports-default-rtdb.firebaseio.com",
        projectId: "kl-esports",
        storageBucket: "kl-esports.appspot.com",
        messagingSenderId: "440301376580",
        appId: "1:440301376580:web:fb0b8ae0df3fe096bd1811"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let allUsers = {};
    let selectedUid = "";

    function init() {
        db.ref('users').on('value', snap => {
            allUsers = snap.val() || {};
            renderUsers(allUsers);
        });
    }

    function renderUsers(data) {
        const list = document.getElementById('userList');
        list.innerHTML = "";
        Object.keys(data).forEach(uid => {
            const u = data[uid];
            const isBanned = u.status === 'Banned';
            list.innerHTML += `
                <div class="user-card" onclick="openUserPopup('${uid}')">
                    <div>
                        <b>${u.username || 'Player'}</b> 
                        ${isBanned ? '<span class="ban-badge">BANNED</span>' : ''}
                        <span class="gn-badge">${u.gameName || 'N/A'}</span><br>
                        <small style="color:#555">ID: ${u.gameID || 'N/A'}</small>
                    </div>
                    <i class="fas fa-chevron-right" style="color:#333"></i>
                </div>`;
        });
    }

    function filterUsers() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const type = document.getElementById('searchType').value;
        const filtered = {};
        Object.keys(allUsers).forEach(uid => {
            const u = allUsers[uid];
            const val = (u[type] || "").toString().toLowerCase();
            if(val.includes(query)) filtered[uid] = u;
        });
        renderUsers(filtered);
    }

    function openUserPopup(uid) {
        const u = allUsers[uid];
        selectedUid = uid;
        document.getElementById('popUserName').innerText = u.username || 'Player';
        document.getElementById('popUserEmail').innerText = u.email || 'No Gmail Found';
        
        document.getElementById('idLink').href = `identity.html?uid=${uid}`;
        document.getElementById('matchLink').href = `match-history.html?uid=${uid}`;
        document.getElementById('transLink').href = `transactions.html?uid=${uid}`;
        
        const banBtn = document.getElementById('banActionBtn');
        if(u.status === 'Banned') {
            banBtn.innerHTML = '<i class="fas fa-user-check"></i><span>Unban Player</span>';
            banBtn.className = "pop-item unban-btn";
            banBtn.onclick = () => handleBanAction('Active');
        } else {
            banBtn.innerHTML = '<i class="fas fa-user-slash"></i><span>Ban Player</span>';
            banBtn.className = "pop-item ban-btn";
            banBtn.onclick = () => handleBanAction('Banned');
        }
        
        document.getElementById('userModal').style.display = 'flex';
    }

    function handleBanAction(status) {
        const action = status === 'Banned' ? "BAN" : "UNBAN";
        if(confirm(`Are you sure you want to ${action} this player?`)) {
            db.ref('users/' + selectedUid).update({ status: status }).then(() => {
                alert(`Player ${action}ed successfully!`);
                closePopup();
            });
        }
    }

    function closePopup() { document.getElementById('userModal').style.display = 'none'; }

    init();
</script>
</body>
</html>
