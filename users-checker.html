<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - User Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root { --p-orange: #ff4d00; --bg: #000; --card-bg: #111; --border: #222; --red: #ff3333; --green: #0fa958; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; padding-top: 160px; }
        
        /* Fixed Search Header */
        .search-container { position: fixed; top: 0; left: 0; width: 100%; background: var(--bg); padding: 15px; box-sizing: border-box; z-index: 1000; border-bottom: 1px solid var(--border); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--p-orange); padding-bottom: 5px; margin-bottom: 10px; }
        .total-badge { background: var(--p-orange); color: white; font-size: 12px; padding: 2px 10px; border-radius: 20px; font-weight: bold; }
        
        .search-box { display: flex; gap: 8px; }
        .search-input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: #0a0a0a; color: white; outline: none; }
        .search-select { padding: 12px; border-radius: 10px; background: var(--card-bg); color: var(--p-orange); border: 1px solid var(--border); font-weight: bold; }
        
        /* User Card */
        .user-card { 
            background: var(--card-bg); 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            padding: 15px; 
            margin-bottom: 10px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            cursor: pointer; 
        }
        .user-info b { font-size: 16px; color: #fff; }
        .user-creds { font-size: 11px; color: #aaa; margin-top: 5px; font-family: monospace; line-height: 1.5; }
        .user-creds i { width: 15px; color: var(--p-orange); }
        .gn-badge { font-size: 10px; color: var(--p-orange); background: #ff4d0022; padding: 2px 5px; border-radius: 4px; font-weight: bold; margin-left: 5px; }

        /* Wallet Display in Card */
        .wallet-mini-display { margin-top: 8px; display: flex; gap: 10px; }
        .w-badge { font-size: 10px; font-weight: bold; padding: 3px 8px; border-radius: 5px; display: flex; align-items: center; gap: 4px; }
        .w-dep { background: #0fa95822; color: #0fa958; border: 1px solid #0fa95844; }
        .w-win { background: #ffd70022; color: #ffd700; border: 1px solid #ffd70044; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: #0a0a0a; border: 1px solid var(--p-orange); border-radius: 20px; padding: 20px; width: 90%; max-width: 380px; text-align: center; max-height: 90vh; overflow-y: auto; }
        .pop-title { color: var(--p-orange); font-weight: bold; font-size: 18px; margin-bottom: 5px; }
        
        /* Wallet Box */
        .wallet-edit-box { background: #1a1a1a; padding: 15px; border-radius: 12px; margin-top: 15px; text-align: left; border: 1px solid #333; }
        .wallet-edit-box label { font-size: 10px; color: #888; font-weight: bold; text-transform: uppercase; }
        .wallet-input { width: 100%; padding: 10px; background: #000; border: 1px solid #333; color: var(--green); border-radius: 8px; margin: 5px 0 12px 0; font-weight: bold; box-sizing: border-box; }
        .update-btn { width: 100%; padding: 12px; background: var(--green); border: none; color: white; border-radius: 10px; font-weight: bold; cursor: pointer; }

        .pop-item { background: #111; border: 1px solid #222; padding: 12px; border-radius: 10px; margin-top: 10px; display: flex; align-items: center; cursor: pointer; color: white; font-size: 13px; text-decoration: none; }
        .pop-item i { margin-right: 12px; color: var(--p-orange); width: 18px; text-align: center; }

        .close-btn { margin-top: 20px; color: #555; cursor: pointer; border: none; background: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="search-container">
    <div class="header">
        <h1 style="font-size: 18px; margin: 0;">GMAIL PLAYERS</h1>
        <div class="total-badge" id="totalCount">Total: 0</div>
    </div>
    <div class="search-box">
        <select id="searchType" class="search-select">
            <option value="username">Name</option>
            <option value="email">Gmail</option>
            <option value="gameName">Game Name</option>
        </select>
        <input type="text" id="searchInput" class="search-input" placeholder="Search..." onkeyup="filterUsers()">
    </div>
</div>

<div id="userList"></div>

<div id="userModal" class="modal">
    <div class="modal-content">
        <div class="pop-title" id="popUserName">USER MENU</div>
        <div style="font-size: 10px; color: #555; margin-bottom: 10px;" id="popUserUid">UID: ...</div>
        
        <div class="wallet-edit-box">
            <label>Deposit Balance (₹)</label>
            <input type="number" id="editDeposit" class="wallet-input">
            <label>Winnings Balance (₹)</label>
            <input type="number" id="editWinnings" class="wallet-input">
            <button class="update-btn" onclick="updateWallet()">UPDATE WALLET</button>
        </div>

        <div style="margin-top: 15px;">
            <a id="matchLink" class="pop-item"><i class="fas fa-gamepad"></i><span>Match Details</span></a>
            <a id="transLink" class="pop-item"><i class="fas fa-history"></i><span>Transaction History</span></a>
            <div id="banActionBtn" class="pop-item"><i class="fas fa-user-slash"></i><span>Ban Player</span></div>
        </div>

        <button class="close-btn" onclick="closePopup()">CLOSE</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBrHcONT6y0he3fzrtRGqdQMZfIMpGxcNo",
        authDomain: "kl-esports.firebaseapp.com",
        databaseURL: "https://kl-esports-default-rtdb.firebaseio.com",
        projectId: "kl-esports",
        storageBucket: "kl-esports.appspot.com",
        messagingSenderId: "440301376580",
        appId: "1:440301376580:web:fb0b8ae0df3fe096bd1811"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let allUsers = {};
    let selectedUid = "";

    function init() {
        db.ref('users').on('value', snap => {
            allUsers = snap.val() || {};
            renderUsers(allUsers);
        });
    }

    function renderUsers(data) {
        const list = document.getElementById('userList');
        list.innerHTML = "";
        let count = 0;

        Object.keys(data).forEach(uid => {
            const u = data[uid];
            // Filter: Only show users with Gmail
            if (u.email && u.email.includes("@")) {
                count++;
                
                let dep = 0, win = 0;
                if (u.wallet && typeof u.wallet === 'object') {
                    dep = u.wallet.deposit || 0;
                    win = u.wallet.winnings || 0;
                } else { dep = u.wallet || 0; }

                list.innerHTML += `
                    <div class="user-card" onclick="openUserPopup('${uid}')">
                        <div class="user-info">
                            <b>${u.username || 'No Name'}</b> <span class="gn-badge">${u.gameName || 'N/A'}</span>
                            <div class="user-creds">
                                <i class="far fa-envelope"></i> ${u.email}<br>
                                <i class="fas fa-key"></i> ${u.password || '---'}
                            </div>
                            <div class="wallet-mini-display">
                                <span class="w-badge w-dep"><i class="fas fa-wallet"></i> DEP: ₹${dep}</span>
                                <span class="w-badge w-win"><i class="fas fa-trophy"></i> WIN: ₹${win}</span>
                            </div>
                        </div>
                        <i class="fas fa-chevron-right" style="color:var(--p-orange)"></i>
                    </div>`;
            }
        });
        document.getElementById('totalCount').innerText = `Total: ${count}`;
    }

    function filterUsers() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const type = document.getElementById('searchType').value;
        const filtered = {};
        Object.keys(allUsers).forEach(uid => {
            const u = allUsers[uid];
            if ((u[type] || "").toString().toLowerCase().includes(query)) filtered[uid] = u;
        });
        renderUsers(filtered);
    }

    function openUserPopup(uid) {
        selectedUid = uid;
        const u = allUsers[uid];
        document.getElementById('popUserName').innerText = u.username || 'Player';
        document.getElementById('popUserUid').innerText = `UID: ${uid}`;
        
        let dep = 0, win = 0;
        if (u.wallet && typeof u.wallet === 'object') {
            dep = u.wallet.deposit || 0; win = u.wallet.winnings || 0;
        } else { dep = u.wallet || 0; }
        document.getElementById('editDeposit').value = dep;
        document.getElementById('editWinnings').value = win;
        
        // Dynamic Links
        document.getElementById('matchLink').href = `match-history.html?uid=${uid}`;
        document.getElementById('transLink').href = `transactions.html?uid=${uid}`;
        
        const banBtn = document.getElementById('banActionBtn');
        if(u.status === 'Banned') {
            banBtn.innerHTML = '<i class="fas fa-user-check" style="color:var(--green)"></i><span>Unban Player</span>';
            banBtn.onclick = () => handleBanAction('Active');
        } else {
            banBtn.innerHTML = '<i class="fas fa-user-slash" style="color:var(--red)"></i><span>Ban Player</span>';
            banBtn.onclick = () => handleBanAction('Banned');
        }
        document.getElementById('userModal').style.display = 'flex';
    }

    function updateWallet() {
        const dep = parseInt(document.getElementById('editDeposit').value) || 0;
        const win = parseInt(document.getElementById('editWinnings').value) || 0;
        db.ref(`users/${selectedUid}/wallet`).update({ deposit: dep, winnings: win })
        .then(() => { alert("Wallet Updated! 🔥"); });
    }

    function handleBanAction(status) {
        if(confirm(`Change status to ${status}?`)) {
            db.ref('users/' + selectedUid).update({ status: status }).then(() => { closePopup(); });
        }
    }

    function closePopup() { document.getElementById('userModal').style.display = 'none'; }
    init();
</script>
</body>
</html>
