<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin - Host & Send</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root { --p-orange: #ff4d00; --bg: #000; --card-bg: #111; --green: #0fa958; --red: #ff3b30; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; }
        .header { display: flex; align-items: center; border-bottom: 2px solid var(--p-orange); padding: 10px 0; margin-bottom: 20px; }
        
        /* Host Card with Send Button */
        .host-card { 
            background: var(--card-bg); border: 1px solid #222; border-radius: 12px; 
            padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; 
            align-items: center; transition: 0.2s;
        }
        .host-card:active { transform: scale(0.98); }
        .host-info { flex-grow: 1; cursor: pointer; } /* Clickable info for Modal */
        .host-info h3 { margin: 0; font-size: 14px; color: #fff; }
        .host-info p { margin: 3px 0 0; font-size: 10px; color: #666; }

        .btn-send-match {
            background: var(--p-orange); color: #000; border: none; padding: 10px 15px;
            border-radius: 8px; font-size: 11px; font-weight: 800; cursor: pointer;
            margin-left: 10px; text-transform: uppercase;
        }

        /* Modal & Match Styles (Nee nerathe thന്ന athe styles) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; overflow-y: auto; padding: 15px; }
        .modal-content { background: #1a1a1a; border-radius: 15px; padding: 20px; max-width: 600px; margin: auto; }
        .match-box { background: #222; padding: 15px; border-radius: 12px; margin-bottom: 20px; border-left: 4px solid var(--p-orange); }
        .btn-row { display: flex; gap: 8px; margin-top: 15px; flex-wrap: wrap; }
        .btn { padding: 8px 12px; border: none; border-radius: 6px; font-size: 10px; font-weight: bold; cursor: pointer; }
        input { width: 100%; padding: 10px; margin: 5px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; box-sizing: border-box; }
        .player-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; font-size: 11px; margin-top: 10px; }
        .player-name { background: #1a1a1a; padding: 5px 8px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="header">
    <i class="fa-solid fa-arrow-left" onclick="window.history.back()" style="margin-right:15px; cursor:pointer; color: var(--p-orange);"></i>
    <h1>Host Manager</h1>
</div>

<div id="hostList"></div>

<div id="controlModal" class="modal">
    <div class="modal-content">
        <span style="float:right; cursor:pointer; color:var(--p-orange);" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></span>
        <h2 id="mHostEmail" style="font-size: 15px;"></h2>
        <div id="matchDetailsArea"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBrHcONT6y0he3fzrtRGqdQMZfIMpGxcNo",
        authDomain: "kl-esports.firebaseapp.com",
        databaseURL: "https://kl-esports-default-rtdb.firebaseio.com",
        projectId: "kl-esports",
        storageBucket: "kl-esports.appspot.com",
        messagingSenderId: "440301376580",
        appId: "1:440301376580:web:fb0b8ae0df3fe096bd1811"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function loadHosts() {
        db.ref('host_requests').on('value', snap => {
            const list = document.getElementById('hostList');
            list.innerHTML = "";
            snap.forEach(child => {
                const host = child.val();
                if (host.status === "approved") {
                    list.innerHTML += `
                        <div class="host-card">
                            <div class="host-info" onclick="openControl('${host.email}')">
                                <h3>${host.email}</h3>
                                <p>Click to view current matches & players</p>
                            </div>
                            <button class="btn-send-match" onclick="sendSelectedToHost('${host.email}')">Send Match</button>
                        </div>`;
                }
            });
        });
    }

    // --- MAIN ACTION: Selected matches aa host-inu kodukunnu ---
    function sendSelectedToHost(email) {
        const selected = JSON.parse(localStorage.getItem("pendingMatches"));
        if (!selected || selected.length === 0) {
            alert("No matches selected! Go back and select matches first.");
            return;
        }

        if (confirm(`Send ${selected.length} match(es) to ${email}?`)) {
            const updates = {};
            const fEmail = email.replace(/[.$#[\]]/g, "_");
            selected.forEach(id => {
                updates[`/matches/${id}/assignedHost`] = fEmail;
            });

            db.ref().update(updates).then(() => {
                alert("Success! Matches assigned.");
                localStorage.removeItem("pendingMatches"); // Reset
                window.location.reload(); // Refresh to see updates
            });
        }
    }

    // --- MODAL CONTROL (Nee nerathe thanna athe logic) ---
    function openControl(email) {
        const fEmail = email.replace(/[.$#[\]]/g, "_");
        document.getElementById('mHostEmail').innerText = "MANAGING: " + email;
        db.ref('matches').on('value', snap => {
            const area = document.getElementById('matchDetailsArea');
            area.innerHTML = "";
            snap.forEach(child => {
                const m = child.val();
                if (m.assignedHost === fEmail) {
                    const mId = child.key;
                    let playerHtml = m.players ? Object.values(m.players).map(p => `<div class="player-name">${p.playerName || p.name}</div>`).join("") : "No players";
                    
                    area.innerHTML += `
                        <div class="match-box">
                            <strong>${m.category}</strong> [${m.status || 'Upcoming'}]
                            <input type="text" id="id_${mId}" placeholder="Room ID" value="${m.roomId || ''}">
                            <input type="text" id="ps_${mId}" placeholder="Password" value="${m.roomPass || ''}">
                            <div class="btn-row">
                                <button class="btn" style="background:var(--green); color:#fff;" onclick="updateMatch('${mId}', 'id_${mId}', 'ps_${mId}')">Update Access</button>
                                <button class="btn" style="background:#444; color:#fff;" onclick="setStatus('${mId}', 'Started')">Start</button>
                                <button class="btn" style="background:#444; color:#fff;" onclick="setStatus('${mId}', 'Ended')">End</button>
                            </div>
                            <div class="player-grid">${playerHtml}</div>
                        </div>`;
                }
            });
        });
        document.getElementById('controlModal').style.display = 'block';
    }

    function updateMatch(id, idF, psF) {
        db.ref('matches/' + id).update({ roomId: document.getElementById(idF).value, roomPass: document.getElementById(psF).value });
    }
    function setStatus(id, s) { db.ref('matches/' + id).update({ status: s }); }
    function closeModal() { document.getElementById('controlModal').style.display = 'none'; }
    loadHosts();
</script>
</body>
</html>
